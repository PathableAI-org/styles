name: Format Check

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.scss'
      - '**/*.sass'
      - '**/*.css'
      - '**/*.json'
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.md'
      - '.prettierrc'
      - '.prettierignore'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      formattable: ${{ github.event_name != 'pull_request' || steps.filter.outputs.formattable == 'true' }}
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            formattable:
              - 'packages/**'
              - '**/*.scss'
              - '**/*.sass'
              - '**/*.css'
              - '**/*.json'
              - '**/*.yaml'
              - '**/*.yml'
              - '**/*.md'
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

  format:
    needs: changes
    if: needs.changes.outputs.formattable == 'true'
    name: Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 23
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm check:format
