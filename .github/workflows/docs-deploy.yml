name: Docs Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 23
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build styles
        run: pnpm --filter @pathable/styles build

      - name: Build main docs
        run: pnpm --filter @pathable/storybook build-storybook

      - name: Token custom property lint
        run: pnpm lint:tokens

      - name: Storybook coverage
        run: pnpm storybook:coverage

      - name: Storybook accessibility tests
        run: |
          set +e
          npx serve -n -l 6006 apps/storybook/storybook-static &
          SERVE_PID=$!
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://127.0.0.1:6006/ 2>/dev/null; then
              echo "Server ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start"
              kill $SERVE_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done
          pnpm --filter @pathable/storybook test-storybook --index-json --url http://127.0.0.1:6006
          TEST_EXIT=$?
          kill $SERVE_PID 2>/dev/null || true
          exit $TEST_EXIT

      - name: Visual smoke tests
        run: pnpm test:visual

      - name: Rebuild main docs for Pages
        run: STORYBOOK_BUILD=true pnpm --filter @pathable/storybook build-storybook

      - name: Build React docs
        run: |
          pnpm --filter @pathable/react build
          pnpm --filter @pathable/storybook-react build-storybook
          mkdir -p apps/storybook/storybook-static/react
          cp -r apps/storybook-react/storybook-static/* apps/storybook/storybook-static/react/

      - name: Create .nojekyll
        run: touch apps/storybook/storybook-static/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: apps/storybook/storybook-static

  deploy:
    needs: build
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
