name: Storybook Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'apps/storybook/**'
      - 'apps/storybook-react/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Storybook accessibility tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 23
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build styles
        run: pnpm --filter @pathable/styles build

      - name: Build HTML Storybook
        run: STORYBOOK_BUILD=true pnpm --filter @pathable/storybook build-storybook

      - name: Test HTML Storybook
        run: |
          npx serve -n -l 6006 apps/storybook/storybook-static &
          sleep 3
          pnpm --filter @pathable/storybook test-storybook --index-json --url http://127.0.0.1:6006

      - name: Build React Storybook
        run: pnpm --filter @pathable/storybook-react build-storybook

      - name: Test React Storybook
        run: |
          npx serve -n -l 6007 apps/storybook-react/storybook-static &
          sleep 3
          pnpm --filter @pathable/storybook-react test-storybook --index-json --url http://127.0.0.1:6007
